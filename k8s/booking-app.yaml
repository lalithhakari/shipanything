# Booking App Deployment and Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-app
  namespace: shipanything
spec:
  replicas: 2
  selector:
    matchLabels:
      app: booking-app
  template:
    metadata:
      labels:
        app: booking-app
    spec:
      initContainers:
      - name: booking-migration
        image: booking-app:latest
        imagePullPolicy: Never
        env:
        - name: APP_ENV
          value: "production"
        - name: APP_DEBUG
          value: "false"
        - name: DB_CONNECTION
          value: "pgsql"
        - name: DB_HOST
          value: "booking-postgres"
        - name: DB_PORT
          value: "5432"
        - name: DB_DATABASE
          value: "booking_db"
        - name: DB_USERNAME
          value: "booking_user"
        - name: DB_PASSWORD
          value: "booking_password"
        - name: REDIS_HOST
          value: "booking-redis"
        - name: REDIS_PORT
          value: "6379"
        command: ["/bin/sh"]
        args: ["-c", "cd /var/www/html && php artisan migrate --force"]
      containers:
      - name: booking-app
        image: booking-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        env:
        - name: APP_ENV
          value: "production"
        - name: APP_DEBUG
          value: "false"
        - name: APP_KEY
          value: "base64:WaDd0e8tU4K1HByATS3lo7lmnNJFH8Y3c5NM+XtpPuE="
        - name: DB_CONNECTION
          value: "pgsql"
        - name: DB_HOST
          value: "booking-postgres"
        - name: DB_PORT
          value: "5432"
        - name: DB_DATABASE
          value: "booking_db"
        - name: DB_USERNAME
          value: "booking_user"
        - name: DB_PASSWORD
          value: "booking_password"
        - name: REDIS_HOST
          value: "booking-redis"
        - name: REDIS_PORT
          value: "6379"
        - name: KAFKA_BROKERS
          value: "kafka:29092"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health.php
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health.php
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: booking-app
  namespace: shipanything
spec:
  selector:
    app: booking-app
  ports:
  - port: 80
    targetPort: 80
