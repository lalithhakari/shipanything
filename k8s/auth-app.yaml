# Auth App Deployment and Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-app
  namespace: shipanything
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-app
  template:
    metadata:
      labels:
        app: auth-app
    spec:
      containers:
      - name: auth-app
        image: auth-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        env:
        - name: APP_ENV
          value: "production"
        - name: APP_DEBUG
          value: "false"
        - name: DB_CONNECTION
          value: "pgsql"
        - name: DB_HOST
          value: "auth-postgres"
        - name: DB_PORT
          value: "5432"
        - name: DB_DATABASE
          value: "auth_db"
        - name: DB_USERNAME
          value: "auth_user"
        - name: DB_PASSWORD
          value: "auth_password"
        - name: REDIS_HOST
          value: "auth-redis"
        - name: REDIS_PORT
          value: "6379"
        - name: KAFKA_BROKERS
          value: "kafka:29092"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: auth-app
  namespace: shipanything
spec:
  selector:
    app: auth-app
  ports:
  - port: 80
    targetPort: 80
